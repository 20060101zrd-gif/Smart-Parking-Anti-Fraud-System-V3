<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>停小券 - 免费停车券领取</title>
  <link rel="stylesheet" href="/tailwind.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 50%,#ede9fe 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
    input{outline:none}.page{display:none}.page.active{display:block}
    .slide-track{position:relative;height:48px;background:#e5e7eb;border-radius:24px;overflow:hidden;touch-action:none}
    .slide-progress{position:absolute;left:0;top:0;height:100%;background:rgba(99,102,241,0.25);border-radius:24px;width:0%;transition:width 0.05s}
    .slide-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:12px;font-weight:500}
    .slide-thumb{position:absolute;left:0;top:0;width:48px;height:48px;background:#6366f1;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;z-index:2;cursor:grab;user-select:none}
    .slide-thumb:active{cursor:grabbing}
    /* 🆕 拼图验证码：固定 280x150 与 SVG 原始尺寸一致，确保拼图块与缺口像素级对齐 */
    .captcha-canvas{position:relative;width:280px;height:150px;margin:0 auto;background:#f8fafb;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb}
    .captcha-canvas svg{width:100%;height:100%;display:block}
    .captcha-piece{position:absolute;left:0;top:0;width:50px;height:50px;cursor:grab;user-select:none;touch-action:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));z-index:10}
    .captcha-piece:active{cursor:grabbing}
    .captcha-piece svg{width:100%;height:100%;display:block}
  </style>
</head>
<body class="p-5">
  <div class="w-full max-w-sm relative">

    <!-- Logo (shared) -->
    <div id="logo" class="text-center mb-8">
      <img src="assets/icon.jpg" alt="停小券" class="w-20 h-20 rounded-2xl mx-auto mb-4 shadow-lg shadow-blue-200 object-cover">
      <h1 id="logo-title" class="text-2xl font-extrabold text-gray-900">停小券</h1>
      <p id="logo-sub" class="text-sm text-gray-500 mt-1">免费停车券 · 一键领取</p>
    </div>

    <!-- ═══ Card ═══ -->
    <div class="bg-white rounded-3xl p-6 shadow-lg shadow-blue-100/50 relative">

      <!-- ====== PAGE 1: Register ====== -->
      <div id="page-register" class="page active">
        <div class="mb-5">
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">手机号码</label>
          <div class="flex items-center bg-gray-50 rounded-xl border border-gray-200 focus-within:border-blue-400 focus-within:ring-4 focus-within:ring-blue-50 transition-all">
            <span class="pl-4 pr-2 text-gray-400 text-sm font-bold">+86</span>
            <input type="tel" id="phone" maxlength="11" placeholder="输入11位手机号" class="flex-1 py-3.5 pr-4 bg-transparent text-base" inputmode="numeric">
          </div>
        </div>
        <div class="mb-6">
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">真实姓名</label>
          <div class="flex items-center bg-gray-50 rounded-xl border border-gray-200 focus-within:border-blue-400 focus-within:ring-4 focus-within:ring-blue-50 transition-all">
            <span class="pl-4 pr-2 text-gray-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></span>
            <input type="text" id="name" placeholder="输入真实姓名" class="flex-1 py-3.5 pr-4 bg-transparent text-base">
          </div>
        </div>
        <button id="register-btn" onclick="handleRegister()" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-3.5 rounded-xl font-bold text-lg shadow-lg shadow-blue-200 active:scale-[0.98] transition-all">注册领券</button>
        <p id="register-error" class="text-center text-red-500 text-xs mt-3 hidden"></p>
      </div>

      <!-- ====== PAGE 2: Captcha ====== -->
      <div id="page-captcha" class="page text-center py-2">
        <p class="text-amber-600 font-semibold text-sm mb-2">⚠️ 检测到异常注册频率</p>
        <p class="text-gray-400 text-xs mb-2">请完成滑动拼图验证</p>
        <div class="bg-gray-50 rounded-xl p-2 mb-2 border border-gray-200 relative">
          <div id="captcha-canvas" class="captcha-canvas">
            <div id="captcha-piece" class="captcha-piece"></div>
          </div>
        </div>
        <!-- 🆕 滑轨 -->
        <div class="slide-track" id="captcha-track" style="height:44px;border-radius:22px">
          <div class="slide-progress" id="captcha-bar"></div>
          <span class="slide-hint" id="captcha-hint">→ 拖动下方滑块使拼图对准缺口 →</span>
          <div class="slide-thumb" id="captcha-thumb" style="left:0;width:44px;height:44px">➜</div>
        </div>
        <p id="cap-status" class="text-xs text-gray-500 mt-2">拖动滑块使拼图对准缺口</p>
      </div>

      <!-- ====== PAGE 3: Home ====== -->
      <div id="page-home" class="page py-2">
        <div id="home-card" class="rounded-2xl border p-5 mb-5">
          <div id="home-badge" class="inline-block rounded-lg px-3 py-1 text-xs font-bold uppercase mb-4"></div>
          <h2 id="home-title" class="text-xl font-bold mb-1"></h2>
          <p id="home-sub" class="text-sm font-medium mb-5"></p>
          <div class="border-t border-gray-200 pt-4 space-y-2">
            <div class="flex justify-between text-sm"><span class="text-gray-500">手机号</span><span class="font-semibold text-gray-900" id="home-phone"></span></div>
            <div class="flex justify-between text-sm"><span class="text-gray-500">停车券</span><span class="font-semibold" id="home-coupon"></span></div>
          </div>
        </div>
        <button onclick="goRegister()" class="w-full border border-gray-300 text-gray-600 py-3.5 rounded-xl font-semibold text-sm mb-3">退出登录</button>
        <button onclick="goCancel()" class="w-full bg-red-50 border border-red-200 text-red-600 py-3.5 rounded-xl font-semibold text-sm">注销账号</button>
      </div>

      <!-- ====== PAGE 4: Cancel ====== -->
      <div id="page-cancel" class="page py-2">
        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-5 mb-4">
          <p class="font-bold text-amber-700 text-sm mb-3">⚠️ 请注意</p>
          <p class="text-amber-800 text-xs leading-relaxed mb-1">• 注销后停车券将立即失效</p>
          <p class="text-amber-800 text-xs leading-relaxed mb-1">• 90 天内无法重新领取</p>
          <p class="text-amber-800 text-xs leading-relaxed">• 个人信息将被合规擦除</p>
        </div>
      <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-5 text-center">
        <p class="text-sm font-semibold text-gray-900 mb-1">当前账号</p>
        <p id="cancel-phone" class="text-sm text-gray-500 mb-5"></p>
        <button id="cancel-btn" onclick="showCancelConfirm()" class="w-full bg-red-600 text-white py-3.5 rounded-xl font-bold text-sm">确认注销账号</button>
      </div>
      <button onclick="goHome()" class="w-full border border-gray-300 text-gray-500 py-3 rounded-xl text-sm">返回</button>
    </div>

    <!-- Cancel Confirm Modal -->
    <div id="cancel-confirm-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-6">
      <div class="bg-white rounded-2xl p-6 w-full max-w-xs">
        <p class="font-bold text-gray-900 mb-2">确认注销？</p>
        <p class="text-sm text-gray-500 mb-5">注销后停车券将失效，90 天内无法再次领取。</p>
        <button onclick="doCancel()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold text-sm mb-2">确定注销</button>
        <button onclick="hideCancelConfirm()" class="w-full border border-gray-300 text-gray-500 py-3 rounded-xl text-sm">取消</button>
      </div>
    </div>

      <!-- ====== PAGE 5: Blocked ====== -->
      <div id="page-blocked" class="page py-4 text-center">
        <div class="w-16 h-16 bg-red-50 border-2 border-red-200 rounded-full mx-auto mb-5 flex items-center justify-center">
          <span class="text-red-600 text-3xl font-extrabold">!</span>
        </div>
        <h2 class="text-xl font-bold text-red-600 mb-2">操作受限</h2>
        <p class="text-sm text-red-800 mb-5">当前账号因触发风控策略已被系统限制</p>
        <div class="border-t border-gray-100 pt-4 mb-4">
          <p class="text-xs text-gray-500 font-semibold mb-2">原因说明</p>
          <p class="text-sm text-gray-600 mb-5" id="blocked-reason"></p>
        </div>
        <div class="bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 mb-3">
          <p class="text-xs text-gray-500" id="blocked-hint">请于 90 天后重新尝试</p>
          <p id="blocked-timer" class="text-sm font-bold text-red-600 hidden mt-1"></p>
        </div>
        <button onclick="goRegister()" class="w-full border border-gray-300 text-gray-600 py-3.5 rounded-xl font-semibold text-sm mb-2">返回首页</button>
        <button id="blocked-retry-btn" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-semibold text-sm hidden" onclick="goRegister()">重新尝试</button>
      </div>

      <!-- Loading overlay -->
      <div id="loading" class="hidden absolute inset-0 bg-white/80 rounded-3xl flex items-center justify-center z-10">
        <div class="flex flex-col items-center gap-2">
          <div class="w-8 h-8 border-2 border-blue-200 border-t-blue-500 rounded-full animate-spin"></div>
          <span id="loading-txt" class="text-sm text-gray-500">提交中...</span>
        </div>
      </div>
    </div>

    <!-- Trust badge -->
    <div class="flex items-center justify-center gap-1.5 mt-5">
      <svg class="w-3.5 h-3.5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      <span class="text-xs text-gray-400">数据加密传输 · 隐私安全保护</span>
    </div>
  </div>

<script>
const API = location.origin + '/api/v1';
let _phone = '', _name = '';

// ── 设备指纹：生成 UUID 并持久化到 localStorage ──
function getDeviceId() {
  let did = localStorage.getItem('_pf_device_id');
  if (!did) {
    did = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
    localStorage.setItem('_pf_device_id', did);
  }
  return did;
}

// ── Page switching ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
}

function showLoading(t) { document.getElementById('loading-txt').textContent = t; document.getElementById('loading').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading').classList.add('hidden'); }
function regError(m) { const e = document.getElementById('register-error'); e.textContent = m; e.classList.remove('hidden'); setTimeout(() => e.classList.add('hidden'), 4000); }

// ── Logout → Register ──
function goRegister() {
  stopBlockCountdown();
  localStorage.removeItem('parking_user');
  _phone = ''; _name = '';
  document.getElementById('phone').value = '';
  document.getElementById('name').value = '';
  document.getElementById('logo-title').textContent = '停小券';
  document.getElementById('logo-sub').textContent = '免费停车券 · 一键领取';
  resetCancelBtn();
  showPage('register');
}

// ── Cancel page ──
function goCancel() {
  document.getElementById('cancel-phone').textContent = _phone;
  showPage('cancel');
}

// ── Back to Home ──
function goHome() { showPage('home'); }

// ── Blocked page countdown ──
let blockCountdownId = null, blockedSince = 0, blockedDuration = 60;
function startBlockCountdown() {
  stopBlockCountdown();
  // 🆕 首次封禁记时间，重复进入不重置
  if (!blockedSince) { blockedSince = Date.now(); blockedDuration = 60; }
  var timerEl = document.getElementById('blocked-timer');
  var retryBtn = document.getElementById('blocked-retry-btn');
  if (!timerEl || !retryBtn) return;
  timerEl.classList.remove('hidden');
  retryBtn.classList.add('hidden');
  function tick() {
    var elapsed = Math.floor((Date.now() - blockedSince) / 1000);
    var remaining = Math.max(0, blockedDuration - elapsed);
    if (remaining <= 0) {
      timerEl.textContent = '封禁已到期，可以重试';
      retryBtn.classList.remove('hidden');
      blockedSince = 0; // 重置，下次封禁重新计时
      return;
    }
    var m = Math.floor(remaining / 60);
    var s = remaining % 60;
    timerEl.textContent = '剩余 ' + (m > 0 ? m + '分' : '') + s + '秒 自动解封';
    blockCountdownId = setTimeout(tick, 1000);
  }
  tick();
}
function stopBlockCountdown() {
  if (blockCountdownId) { clearTimeout(blockCountdownId); blockCountdownId = null; }
  var t = document.getElementById('blocked-timer');
  if (t) { t.classList.add('hidden'); t.textContent = ''; }
  var b = document.getElementById('blocked-retry-btn');
  if (b) b.classList.add('hidden');
}

// ═══════════════ REGISTER ═══════════════
async function handleRegister() {
  _phone = document.getElementById('phone').value.trim();
  _name = document.getElementById('name').value.trim();
  if (!/^1[3-9]\d{9}$/.test(_phone)) return regError('请输入正确的11位手机号');
  if (!_name) return regError('请输入姓名');
  doRegister(null);
}

async function doRegister(captchaToken) {
  showLoading('提交中...');
  const ep = captchaToken ? '/user/verify-captcha' : '/user/register';
  const deviceId = getDeviceId();
  const body = captchaToken ? { phone: _phone, name: _name, captchaToken, deviceId } : { phone: _phone, name: _name, deviceId };
  try {
    const r = await fetch(API + ep, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.code === 20000) {
      const u = { phone: _phone, hasCoupon: d.data.hasCoupon ?? true, isExisting: d.data.isExisting ?? false };
      localStorage.setItem('parking_user', JSON.stringify(u));
      renderHome(u);
      showPage('home');
    } else if (d.code === 40101) {
      resetCaptcha();
      showPage('captcha');
      loadCaptcha();
    } else if (d.code === 40300 || d.code === 40301 || d.code === 40302) {
      const msg = d.message || '';
      document.getElementById('blocked-reason').textContent = msg || '检测到历史注销记录，90天内无法再次领取';
      // 区分：设备注册超限 vs 黑名单封禁
      if (msg.includes('关联账号已超限')) {
        document.getElementById('blocked-hint').textContent = '可注销旧账号释放名额后重新注册';
      } else if (d.code === 40302) {
        document.getElementById('blocked-hint').textContent = 'IP 已被临时封禁';
        startBlockCountdown();
      } else {
        document.getElementById('blocked-hint').textContent = '请于 90 天后重新尝试';
      }
      showPage('blocked');
    } else {
      regError(d.message || '注册失败，请重试');
    }
  } catch { regError('网络错误，请检查连接'); }
  hideLoading();
}

// ═══════════════ HOME ═══════════════
function renderHome(u) {
  document.getElementById('logo-title').textContent = '停小券';
  document.getElementById('logo-sub').textContent = '停车券账户';
  const isEx = u.isExisting;
  const card = document.getElementById('home-card');
  card.className = 'rounded-2xl border p-5 mb-5';
  card.style.backgroundColor = isEx ? '#FFFBEB' : '#F0FDF4';
  card.style.borderColor = isEx ? '#FCD34D' : '#BBF7D0';
  const b = document.getElementById('home-badge');
  b.style.backgroundColor = isEx ? '#FDE68A' : '#A7F3D0';
  b.style.color = isEx ? '#D97706' : '#059669';
  b.textContent = isEx ? '已有账户' : '新用户';
  const t = document.getElementById('home-title');
  t.style.color = isEx ? '#D97706' : '#059669';
  t.textContent = isEx ? '欢迎回来' : '注册成功';
  const s = document.getElementById('home-sub');
  s.style.color = isEx ? '#F59E0B' : '#10B981';
  s.textContent = isEx ? '您的停车券已领取' : '停车券已发放到您的账户';
  document.getElementById('home-phone').textContent = u.phone;
  document.getElementById('home-coupon').textContent = u.hasCoupon ? '正常可用' : '已失效';
}

// ═══════════════ CANCEL ═══════════════
function showCancelConfirm() { document.getElementById('cancel-confirm-modal').classList.remove('hidden'); document.getElementById('cancel-confirm-modal').style.display = 'flex'; }
function hideCancelConfirm() { document.getElementById('cancel-confirm-modal').classList.add('hidden'); document.getElementById('cancel-confirm-modal').style.display = 'none'; }
function resetCancelBtn() { const btn = document.getElementById('cancel-btn'); btn.disabled = false; btn.textContent = '确认注销账号'; }
async function doCancel() {
  hideCancelConfirm();
  showLoading('注销中...');
  const btn = document.getElementById('cancel-btn'); btn.disabled = true; btn.textContent = '处理中...';
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);
    const r = await fetch(API + '/user/cancel', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone: _phone, deviceId: getDeviceId() }), signal: controller.signal });
    clearTimeout(timeout);
    const data = await r.json();
    if (data.code === 20000) {
      localStorage.removeItem('parking_user');
      alert('账号已注销，个人信息已完成合规擦除');
      goRegister();
    } else {
      alert(data.message || '注销失败');
      resetCancelBtn();
    }
  } catch (err) {
    if (err.name === 'AbortError') alert('请求超时，请重试');
    else alert('网络错误，请检查连接');
    resetCancelBtn();
  }
  hideLoading();
}

// ═══════════════ CAPTCHA ═══════════════
let capData = null, capDragging = false, capScale = 1, capMaxX = 0;
let capPieceX = 0, capPieceY = 0, capStartX = 0, capStartLeft = 0;
let capCanvas, capPiece, capThumb, capBar;

function capInit() {
  capCanvas = document.getElementById('captcha-canvas');
  capPiece = document.getElementById('captcha-piece');
  capThumb = document.getElementById('captcha-thumb');
  capBar = document.getElementById('captcha-bar');

  // 拼图块直接拖拽
  capPiece.addEventListener('mousedown', puzzleStart);
  capPiece.addEventListener('touchstart', puzzleStart, { passive: false });

  // 滑轨 thumb 拖拽
  capThumb.addEventListener('mousedown', thumbStart);
  capThumb.addEventListener('touchstart', thumbStart, { passive: false });

  document.addEventListener('mousemove', capMove);
  document.addEventListener('mouseup', capEnd);
  document.addEventListener('touchmove', capMove, { passive: false });
  document.addEventListener('touchend', capEnd);
}

function loadCaptcha() {
  fetch(API + '/captcha/generate').then(r => r.json()).then(d => {
    if (d.code !== 20000) {
      document.getElementById('cap-status').textContent = '验证码加载失败';
      if (d.code === 40302) {
        document.getElementById('blocked-reason').textContent = '验证码连续失败触发 IP 临时封禁';
        document.getElementById('blocked-hint').textContent = 'IP 已被临时封禁';
        showPage('blocked');
        startBlockCountdown();
      }
      return;
    }
    capData = d.data;
    // 🆕 延迟 50ms 确保 reflow，offsetWidth 才能取到实际宽度
    setTimeout(function(){ renderCaptcha(d.data); }, 50);
  }).catch(function(){ document.getElementById('cap-status').textContent = '网络错误'; });
}

function renderCaptcha(data) {
  var cw = capCanvas.offsetWidth;
  if (!cw || cw < 50) cw = data.canvas.width; // offsetWidth 为 0 时 fallback
  capScale = cw / data.canvas.width;
  capMaxX = (data.canvas.width - data.puzzle.width) * capScale;

  var rawY = (data.puzzleY != null) ? Number(data.puzzleY) : (data.canvas.height - data.puzzle.height) / 2;
  if (isNaN(rawY) || rawY < 0 || rawY > data.canvas.height) rawY = (data.canvas.height - data.puzzle.height) / 2;
  capPieceY = Math.round(rawY * capScale);

  // 背景 SVG：填满整个 canvas 容器，不残留白边
  capCanvas.innerHTML = data.backgroundSvg;
  var bgSvg = capCanvas.querySelector('svg');
  if (bgSvg) {
    bgSvg.setAttribute('width', '100%');
    bgSvg.setAttribute('height', '100%');
    bgSvg.style.width = '100%';
    bgSvg.style.height = '100%';
  }

  // 拼图块 SVG（与缺口位图案完全一致）
  capPiece.innerHTML = data.puzzleSvg;
  capPiece.style.width = (data.puzzle.width * capScale) + 'px';
  capPiece.style.height = (data.puzzle.height * capScale) + 'px';
  capPiece.style.top = capPieceY + 'px';
  capPieceX = 0;
  setCapPosition(0);

  // 复位滑轨
  capThumb.style.left = '0px';
  capBar.style.width = '0%';
  document.getElementById('captcha-hint').textContent = '→ 拖动下方滑块使拼图对准缺口 →';

  document.getElementById('cap-status').textContent = '';
  capDragging = false;
}

function setCapPosition(x) {
  capPieceX = Math.max(0, Math.min(x, capMaxX));
  // 用 left/top 定位，兼容性和可调试性更好
  capPiece.style.left = capPieceX.toFixed(1) + 'px';

  // 同步 thumb 位置
  const trackW = capThumb.parentElement.offsetWidth - capThumb.offsetWidth;
  const thumbLeft = capMaxX > 0 ? (capPieceX / capMaxX) * trackW : 0;
  capThumb.style.left = Math.max(0, Math.min(thumbLeft, trackW)) + 'px';
  capBar.style.width = capMaxX > 0 ? ((capPieceX / capMaxX) * 100).toFixed(0) + '%' : '0%';
}

// ── 拼图块直接拖拽 ──
function puzzleStart(e) {
  capStartX = e.touches ? e.touches[0].clientX : e.clientX;
  capStartLeft = capPieceX;
  capDragging = 1; // 1=dragging piece
  document.getElementById('captcha-hint').textContent = '...';
  e.preventDefault();
}

// ── 滑轨 thumb 拖拽 ──
function thumbStart(e) {
  capStartX = e.touches ? e.touches[0].clientX : e.clientX;
  capStartLeft = parseFloat(capThumb.style.left || 0);
  capDragging = 2; // 2=dragging thumb
  document.getElementById('captcha-hint').textContent = '...';
  e.preventDefault();
}

function capMove(e) {
  if (!capDragging) return;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const dx = cx - capStartX;

  if (capDragging === 1) {
    // 拖拼图块 → 同步 thumb
    setCapPosition(capStartLeft + dx);
  } else {
    // 拖 thumb → 同步拼图块
    const trackW = capThumb.parentElement.offsetWidth - capThumb.offsetWidth;
    const thumbLeft = Math.max(0, Math.min(capStartLeft + dx, trackW));
    capThumb.style.left = thumbLeft + 'px';
    capBar.style.width = trackW > 0 ? ((thumbLeft / trackW) * 100).toFixed(0) + '%' : '0%';
    const pieceLeft = trackW > 0 ? (thumbLeft / trackW) * capMaxX : 0;
    capPieceX = pieceLeft;
    capPiece.style.left = capPieceX.toFixed(1) + 'px';
  }
  e.preventDefault();
}

function capEnd() {
  if (!capDragging) return;
  capDragging = false;
  const serverX = Math.round(capPieceX / capScale);
  verifyCaptcha(serverX);
}

async function verifyCaptcha(sliderX) {
  document.getElementById('cap-status').textContent = '验证中...';
  try {
    const v = await fetch(API + '/captcha/verify', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ captchaId: capData.captchaId, sliderX })
    }).then(r => r.json());
    if (v.code === 20000) {
      document.getElementById('cap-status').textContent = '✅ 验证通过';
      document.getElementById('captcha-hint').textContent = '✅ 验证通过';
      doRegister(v.data.token);
    } else if (v.code === 40302) {
      // 🆕 IP 被封 → 显示带倒计时的封禁页
      document.getElementById('blocked-reason').textContent = '验证码连续失败触发 IP 临时封禁';
      document.getElementById('blocked-hint').textContent = 'IP 已被临时封禁';
      showPage('blocked');
      startBlockCountdown();
    } else {
      const failCount = (v.data && v.data.failCount) || 0;
      document.getElementById('cap-status').textContent = '❌ 验证失败 (' + failCount + '/3)，请重试';
      document.getElementById('captcha-hint').textContent = '→ 拖动下方滑块使拼图对准缺口 →';
      if (v.code === 40007) document.getElementById('cap-status').textContent = '验证码已过期，正在刷新...';
      setTimeout(loadCaptcha, 1200);
    }
  } catch {
    document.getElementById('cap-status').textContent = '网络错误，请重试';
  }
}

function resetCaptcha() {
  capPieceX = 0;
  if (capPiece) setCapPosition(0);
  if (capThumb) { capThumb.style.left = '0px'; capBar.style.width = '0%'; }
  document.getElementById('cap-status').textContent = '';
  capDragging = false;
}

// ── Init: restore session + captcha handlers ──
(function() {
  capInit();
  const u = localStorage.getItem('parking_user');
  if (u) {
    const parsed = JSON.parse(u);
    _phone = parsed.phone;
    renderHome(parsed);
    showPage('home');
  }
})();
</script>
