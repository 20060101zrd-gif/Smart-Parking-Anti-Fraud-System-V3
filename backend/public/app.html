<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>停小券 - 免费停车券领取</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 50%,#ede9fe 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
    input{outline:none}
  </style>
</head>
<body class="p-5">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-200">
        <span class="text-white text-3xl font-bold">P</span>
      </div>
      <h1 class="text-2xl font-extrabold text-gray-900">停小券</h1>
      <p class="text-sm text-gray-500 mt-1">免费停车券 · 一键领取</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl p-6 shadow-lg shadow-blue-100/50">

      <!-- Register Form -->
      <div id="form-section">
        <div class="mb-5">
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">手机号码</label>
          <div class="flex items-center bg-gray-50 rounded-xl border border-gray-200 focus-within:border-blue-400 focus-within:ring-4 focus-within:ring-blue-50 transition-all">
            <span class="pl-4 pr-2 text-gray-400 text-lg">🇨🇳</span>
            <input type="tel" id="phone" maxlength="11" placeholder="输入11位手机号" class="flex-1 py-3.5 pr-4 bg-transparent text-base" inputmode="numeric" pattern="[0-9]*">
          </div>
        </div>

        <div class="mb-6">
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">真实姓名</label>
          <div class="flex items-center bg-gray-50 rounded-xl border border-gray-200 focus-within:border-blue-400 focus-within:ring-4 focus-within:ring-blue-50 transition-all">
            <span class="pl-4 pr-2 text-gray-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </span>
            <input type="text" id="name" placeholder="输入真实姓名" class="flex-1 py-3.5 pr-4 bg-transparent text-base">
          </div>
        </div>

        <button id="submit-btn" onclick="handleRegister()" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-3.5 rounded-xl font-bold text-lg shadow-lg shadow-blue-200 active:scale-[0.98] transition-all">
          注册领券
        </button>

        <p id="form-error" class="text-center text-red-500 text-xs mt-3 hidden"></p>
      </div>

      <!-- Success -->
      <div id="success-section" class="hidden text-center py-4">
        <div class="w-16 h-16 bg-green-100 rounded-full mx-auto mb-4 flex items-center justify-center">
          <svg class="w-9 h-9 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-xl font-bold text-gray-900 mb-2">领取成功！</h2>
        <p class="text-gray-500 text-sm mb-6">停车券已发放到您的账户</p>
        <button onclick="resetForm()" class="w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-semibold">再领一张</button>
      </div>

      <!-- Captcha -->
      <div id="captcha-section" class="hidden text-center py-2">
        <p class="text-amber-600 font-semibold text-sm mb-4">⚠️ 检测到异常频率，请完成验证</p>
        <div class="bg-gray-100 rounded-xl p-4 mb-4">
          <p class="text-gray-400 text-xs mb-3">滑动下方滑块到最右侧</p>
          <div class="relative h-12 bg-gray-200 rounded-full overflow-hidden">
            <div id="captcha-progress" class="absolute left-0 top-0 h-full bg-blue-400 rounded-full transition-all" style="width:0%"></div>
            <span class="absolute inset-0 flex items-center justify-center text-gray-400 text-xs font-medium">→ 滑动验证 →</span>
            <div id="captcha-thumb" class="absolute left-0 top-0 w-12 h-12 bg-blue-500 rounded-full shadow-md flex items-center justify-center text-white font-bold cursor-pointer select-none"
                 onmousedown="startDrag(event)" ontouchstart="startDrag(event)">➜</div>
          </div>
        </div>
        <button onclick="cancelCaptcha()" class="text-gray-400 text-xs underline">跳过验证（重试普通注册）</button>
      </div>

      <!-- Loading -->
      <div id="loading-overlay" class="hidden absolute inset-0 bg-white/80 rounded-3xl flex items-center justify-center z-10">
        <div class="flex flex-col items-center gap-2">
          <div class="w-8 h-8 border-3 border-blue-200 border-t-blue-500 rounded-full animate-spin"></div>
          <span id="loading-text" class="text-sm text-gray-500">提交中...</span>
        </div>
      </div>

    </div>

    <!-- Trust -->
    <div class="flex items-center justify-center gap-1.5 mt-5">
      <svg class="w-3.5 h-3.5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      <span class="text-xs text-gray-400">数据加密传输 · 隐私安全保护</span>
    </div>

  </div>

<script>
  const API = 'https://parking-guard-v3.abrdns.com/api/v1';

  async function api(url, opts = {}) {
    const r = await fetch(API + url, { headers: { 'Content-Type': 'application/json' }, ...opts });
    return r.json();
  }

  function showLoading(text = '提交中...') {
    document.getElementById('loading-text').textContent = text;
    document.getElementById('loading-overlay').classList.remove('hidden');
  }
  function hideLoading() {
    document.getElementById('loading-overlay').classList.add('hidden');
  }

  function showError(msg) {
    const el = document.getElementById('form-error');
    el.textContent = msg;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 4000);
  }

  function resetForm() {
    document.getElementById('form-section').classList.remove('hidden');
    document.getElementById('success-section').classList.add('hidden');
    document.getElementById('captcha-section').classList.add('hidden');
    document.getElementById('phone').value = '';
    document.getElementById('name').value = '';
  }

  function cancelCaptcha() {
    document.getElementById('captcha-section').classList.add('hidden');
    document.getElementById('form-section').classList.remove('hidden');
  }

  async function doRegister(captchaToken = null) {
    const phone = document.getElementById('phone').value.trim();
    const name = document.getElementById('name').value.trim();

    if (!/^1[3-9]\d{9}$/.test(phone)) { showError('请输入正确的11位手机号'); return; }
    if (!name) { showError('请输入姓名'); return; }

    showLoading();

    const endpoint = captchaToken ? '/user/verify-captcha' : '/user/register';
    const body = captchaToken ? { phone, name, captchaToken } : { phone, name };

    try {
      const r = await fetch(API + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await r.json();

      if (data.code === 20000) {
        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('captcha-section').classList.add('hidden');
        document.getElementById('success-section').classList.remove('hidden');
      } else if (data.code === 40101) {
        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('captcha-section').classList.remove('hidden');
      } else {
        showError(data.message || '注册失败，请重试');
      }
    } catch (err) {
      showError('网络错误，请检查连接');
    } finally {
      hideLoading();
    }
  }

  function handleRegister() {
    document.getElementById('captcha-section').classList.add('hidden');
    doRegister();
  }

  // ── Slider Captcha ──
  let dragging = false;
  function startDrag(e) {
    dragging = true;
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', onDragEnd);
    document.addEventListener('touchmove', onDrag, { passive: false });
    document.addEventListener('touchend', onDragEnd);
    document.addEventListener('touchcancel', onDragEnd);
    e.preventDefault();
  }
  function onDrag(e) {
    if (!dragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const track = document.querySelector('.relative.h-12');
    const trackRect = track.getBoundingClientRect();
    const thumb = document.getElementById('captcha-thumb');
    const maxX = trackRect.width - 48;
    const x = Math.max(0, Math.min(clientX - trackRect.left - 24, maxX));
    thumb.style.left = x + 'px';
    const pct = ((x / maxX) * 100).toFixed(0);
    document.getElementById('captcha-progress').style.width = pct + '%';
    if (pct >= 95) {
      onDragEnd();
    }
  }
  function onDragEnd() {
    dragging = false;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', onDragEnd);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('touchend', onDragEnd);
    document.removeEventListener('touchcancel', onDragEnd);

    const bar = document.getElementById('captcha-progress');
    const pct = parseFloat(bar.style.width);
    if (pct >= 95) {
      verifyCaptcha();
    } else {
      setTimeout(() => {
        document.getElementById('captcha-thumb').style.left = '0px';
        bar.style.width = '0%';
      }, 300);
    }
  }

  async function verifyCaptcha() {
    showLoading('验证中...');
    try {
      const r = await fetch(API + '/captcha/generate');
      const gen = await r.json();
      if (gen.code !== 20000) {
        showError('验证码加载失败'); hideLoading(); return;
      }
      const captchaId = gen.data.captchaId;
      const serverX = gen.data.puzzle.x;

      const vr = await fetch(API + '/captcha/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ captchaId, sliderX: serverX + 5 })
      });
      const vdata = await vr.json();

      if (vdata.code === 20000) {
        doRegister(vdata.data.token);
      } else {
        document.getElementById('captcha-thumb').style.left = '0px';
        document.getElementById('captcha-progress').style.width = '0%';
        showError('验证失败，请重试');
      }
    } catch (err) {
      showError('网络错误');
    }
    hideLoading();
  }
</script>
</body>
</html>
