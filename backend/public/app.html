  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{height:100%}
    body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#E8EFF9 0%,#DCE9F8 50%,#E0F2EA 100%);min-height:100vh;min-height:100dvh;min-height:-webkit-fill-available;display:flex;align-items:center;justify-content:center;color:#1F2A44}
    input{outline:none}.page{display:none}.page.active{display:block}
    #loading,.hidden-until-css{display:none}
    /* 滑块验证码 — 与 logo 配色 */
    .slide-track{position:relative;height:48px;background:#E8EFF9;border-radius:100px;overflow:hidden;touch-action:none;border:1px solid #D0DDF2}
    .slide-progress{position:absolute;left:0;top:0;height:100%;background:rgba(59,111,224,0.18);border-radius:100px;width:0%;transition:width 0.05s}
    .slide-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#7B8AA8;font-size:12px;font-weight:500;letter-spacing:0.2px}
    .slide-thumb{position:absolute;left:0;top:0;width:48px;height:48px;background:linear-gradient(135deg,#3B6FE0 0%,#5A8BF0 100%);border-radius:50%;box-shadow:0 4px 12px rgba(59,111,224,0.35);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;z-index:2;cursor:grab;user-select:none}
    .slide-thumb:active{cursor:grabbing}

    .captcha-canvas svg{width:100%;height:100%;display:block}
    .captcha-piece{position:absolute;left:0;top:0;width:50px;height:50px;cursor:grab;user-select:none;touch-action:none;box-shadow:0 2px 8px rgba(0,0,0,0.4);z-index:10}
    .captcha-piece:active{cursor:grabbing}
    .captcha-piece svg{width:100%;height:100%;display:block}
    /* ══════════════════════════════════════════
       🔑 关键 CSS 骨架 — Tailwind 未加载时的首屏渲染
       ══════════════════════════════════════════ */
    /* -- layout -- */
    .w-full{width:100%}.max-w-sm{max-width:24rem}.relative{position:relative}.fixed{position:fixed}
    .mx-auto{margin-left:auto;margin-right:auto}.inset-0{top:0;right:0;bottom:0;left:0}

    .block{display:block}.flex{display:flex}.inline-block{display:inline-block}.inline-flex{display:inline-flex}

    .pl-4{padding-left:1rem}.pr-2{padding-right:.5rem}.pr-4{padding-right:1rem}
    .py-1{padding-top:.25rem;padding-bottom:.25rem}.py-2{padding-top:.5rem;padding-bottom:.5rem}
    .py-3{padding-top:.75rem;padding-bottom:.75rem}
    .py-3\.5{padding-top:.875rem;padding-bottom:.875rem}.py-4{padding-top:1rem;padding-bottom:1rem}
    .pt-4{padding-top:1rem}.pt-5{padding-top:1.25rem}
    .mb-1{margin-bottom:.25rem}.mb-1\.5{margin-bottom:.375rem}.mb-2{margin-bottom:.5rem}
    .mb-3{margin-bottom:.75rem}.mb-4{margin-bottom:1rem}.mb-5{margin-bottom:1.25rem}
    .mb-6{margin-bottom:1.5rem}.mb-8{margin-bottom:2rem}
    .mt-1{margin-top:.25rem}.mt-2{margin-top:.5rem}.mt-3{margin-top:.75rem}.mt-5{margin-top:1.25rem}
    .gap-1\.5{gap:.375rem}.gap-2{gap:.5rem}.gap-3{gap:.75rem}
    .space-y-2>*+*{margin-top:.5rem}
    /* -- typography -- */
    .text-xs{font-size:.75rem;line-height:1rem}.text-sm{font-size:.875rem;line-height:1.25rem}
    .text-base{font-size:1rem;line-height:1.5rem}.text-lg{font-size:1.125rem;line-height:1.75rem}
    .text-xl{font-size:1.25rem;line-height:1.75rem}.text-2xl{font-size:1.5rem;line-height:2rem}

    .text-center{text-align:center}.uppercase{text-transform:uppercase}.leading-relaxed{line-height:1.625}

        <p class="text-sm mb-5" style="color:#7B8AA8">注销后停车券将失效，90 天内无法再次领取。</p>
        <button onclick="doCancel()" class="w-full py-3 rounded-xl font-bold text-sm mb-2" style="background:#E0294B;color:#FFFFFF">确定注销</button>

      <!-- ====== 风控拦截 ====== -->

<script src="/jigsaw.min.js"></script>
<script>
const API = location.origin + '/api/v1';
let _phone = '', _name = '';

// ── 设备指纹：生成 UUID 并持久化到 localStorage ──
function getDeviceId() {
  let did = localStorage.getItem('_pf_device_id');
  if (!did) {
    did = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
    localStorage.setItem('_pf_device_id', did);
  }
  return did;
}

// ── Page switching ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
}

function showLoading(t) { const el = document.getElementById('loading'); if(el){ el.style.display='flex'; document.getElementById('loading-txt').textContent = t; } }
function hideLoading() { const el = document.getElementById('loading'); if(el) el.style.display='none'; }
function regError(m) { const e = document.getElementById('register-error'); e.textContent = m; e.style.display = 'block'; setTimeout(() => { e.style.display = 'none'; }, 4000); }

// ── Logout → Register ──
function goRegister() {
  stopBlockCountdown();
  localStorage.removeItem('parking_user');
  _phone = ''; _name = '';
  document.getElementById('phone').value = '';
  document.getElementById('name').value = '';
  document.getElementById('logo-title').textContent = '停小券';
  document.getElementById('logo-sub').textContent = '免费停车券 · 一键领取';
  resetCancelBtn();
  showPage('register');
}

// ── Cancel page ──
function goCancel() {
  document.getElementById('cancel-phone').textContent = _phone;
  showPage('cancel');
}

// ── Back to Home ──
function goHome() {
  var phoneInput = document.getElementById('phone').value.trim();
  if (/^1[3-9]\d{9}$/.test(phoneInput)) {
    _phone = phoneInput;
    _name = document.getElementById('name').value.trim() || '用户';
    showLoading('查询账户...');
    doQuickLogin();
    return;
  }
  // No phone input — try localStorage
  var u = localStorage.getItem('parking_user');
  if (u) {
    try {
      var parsed = JSON.parse(u);
      _phone = parsed.phone;
      renderHome(parsed);
      showPage('home');
      return;
    } catch (e) {}
  }
  regError('请先输入手机号再点击直接登陆');
}

async function doQuickLogin() {
  try {
    const deviceId = getDeviceId();
    const r = await fetch(API + '/user/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone: _phone, name: _name, deviceId }) });
    const d = await r.json();
    hideLoading();
    if (d.code === 20000) {
      const u = { phone: _phone, hasCoupon: d.data.hasCoupon != null ? d.data.hasCoupon : true, isExisting: d.data.isExisting != null ? d.data.isExisting : false };
      localStorage.setItem('parking_user', JSON.stringify(u));
      renderHome(u);
      showPage('home');
    } else {
      regError(d.message || '登录失败，请核对手机号后重试');
    }
  } catch { hideLoading(); regError('网络错误，请检查连接'); }
}

// ── Blocked page countdown ──
let blockCountdownId = null, blockedSince = 0, blockedDuration = 60;
function startBlockCountdown() {
  stopBlockCountdown();
  if (!blockedSince) { blockedSince = Date.now(); blockedDuration = 60; }
  var timerEl = document.getElementById('blocked-timer');
  var retryBtn = document.getElementById('blocked-retry-btn');
  if (!timerEl || !retryBtn) return;
  timerEl.style.display = 'block';
  retryBtn.style.display = 'none';
  function tick() {
    var elapsed = Math.floor((Date.now() - blockedSince) / 1000);
    var remaining = Math.max(0, blockedDuration - elapsed);
    if (remaining <= 0) {
      timerEl.textContent = '封禁已到期，可以重试';
      retryBtn.style.display = 'block';
      blockedSince = 0;
      return;
    }
    var m = Math.floor(remaining / 60);
    var s = remaining % 60;
    timerEl.textContent = '剩余 ' + (m > 0 ? m + '分' : '') + s + '秒 自动解封';
    blockCountdownId = setTimeout(tick, 1000);
  }
  tick();
}
function stopBlockCountdown() {
  if (blockCountdownId) { clearTimeout(blockCountdownId); blockCountdownId = null; }
  var t = document.getElementById('blocked-timer');
  if (t) { t.style.display = 'none'; t.textContent = ''; }
  var b = document.getElementById('blocked-retry-btn');
  if (b) b.style.display = 'none';
}

// ═══════════════ REGISTER ═══════════════
async function handleRegister() {
  _phone = document.getElementById('phone').value.trim();
  _name = document.getElementById('name').value.trim();
  if (!/^1[3-9]\d{9}$/.test(_phone)) return regError('请输入正确的11位手机号');
  if (!_name) return regError('请输入姓名');
  doRegister(null);
}

async function doRegister(captchaToken) {
  showLoading('提交中...');
  const ep = captchaToken ? '/user/verify-captcha' : '/user/register';
  const deviceId = getDeviceId();
  const body = captchaToken ? { phone: _phone, name: _name, captchaToken, deviceId } : { phone: _phone, name: _name, deviceId };
  // 🆕 jigsaw 直通：发送 X-Jigsaw-Verified: 1 头让后端自动生成 token
  const headers = { 'Content-Type': 'application/json' };
  if (typeof captchaToken === 'string' && captchaToken.startsWith('jigsaw-')) {
    headers['X-Jigsaw-Verified'] = '1';
  }
  try {
    const r = await fetch(API + ep, { method: 'POST', headers, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.code === 20000) {
      const u = { phone: _phone, hasCoupon: d.data.hasCoupon != null ? d.data.hasCoupon : true, isExisting: d.data.isExisting != null ? d.data.isExisting : false };
      localStorage.setItem('parking_user', JSON.stringify(u));
      renderHome(u);
      showPage('home');
    } else if (d.code === 40101) {
      resetCaptcha();
      showPage('captcha');
      // 延迟初始化 jigsaw，等待 DOM 完成布局（display:block 生效后才有尺寸）
      setTimeout(function(){ loadCaptcha(); }, 100);
    } else if (d.code === 40300 || d.code === 40301 || d.code === 40302) {
      const msg = d.message || '';
      document.getElementById('blocked-reason').textContent = msg || '检测到历史注销记录，90天内无法再次领取';
      // 区分：设备注册超限 vs 黑名单封禁
      if (msg.includes('关联账号已超限')) {
        document.getElementById('blocked-hint').textContent = '可注销旧账号释放名额后重新注册';
      } else if (d.code === 40302) {
        document.getElementById('blocked-hint').textContent = 'IP 已被临时封禁';
        startBlockCountdown();
      } else {
        document.getElementById('blocked-hint').textContent = '请于 90 天后重新尝试';
      }
      showPage('blocked');
    } else {
      regError(d.message || '注册失败，请重试');
    }
  } catch { regError('网络错误，请检查连接'); }
  hideLoading();
}

// ═══════════════ HOME ═══════════════
function renderHome(u) {
  document.getElementById('logo-title').textContent = '停小券';
  document.getElementById('logo-sub').textContent = '停车券账户';
  const isEx = u.isExisting;
  const card = document.getElementById('home-card');
  card.className = 'rounded-2xl border p-5 mb-5';
  card.style.backgroundColor = isEx ? '#FFFBEB' : '#F0FDF4';
  card.style.borderColor = isEx ? '#FCD34D' : '#BBF7D0';
  const b = document.getElementById('home-badge');
  b.style.backgroundColor = isEx ? '#FDE68A' : '#A7F3D0';
  b.style.color = isEx ? '#D97706' : '#059669';
  b.textContent = isEx ? '已有账户' : '新用户';
  const t = document.getElementById('home-title');
  t.style.color = isEx ? '#D97706' : '#059669';
  t.textContent = isEx ? '欢迎回来' : '注册成功';
  const s = document.getElementById('home-sub');
  s.style.color = isEx ? '#F59E0B' : '#10B981';
  s.textContent = isEx ? '您的停车券已领取' : '停车券已发放到您的账户';
  document.getElementById('home-phone').textContent = u.phone;
  document.getElementById('home-coupon').textContent = u.hasCoupon ? '正常可用' : '已失效';
}

// ═══════════════ CANCEL ═══════════════
function showCancelConfirm() { document.getElementById('cancel-confirm-modal').style.display = 'flex'; }
function hideCancelConfirm() { document.getElementById('cancel-confirm-modal').style.display = 'none'; }
function resetCancelBtn() { const btn = document.getElementById('cancel-btn'); btn.disabled = false; btn.textContent = '确认注销账号'; }
async function doCancel() {
  hideCancelConfirm();
  showLoading('注销中...');
  const btn = document.getElementById('cancel-btn'); btn.disabled = true; btn.textContent = '处理中...';
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);
    const r = await fetch(API + '/user/cancel', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone: _phone, deviceId: getDeviceId() }), signal: controller.signal });
    clearTimeout(timeout);
    const data = await r.json();
    if (data.code === 20000) {
      localStorage.removeItem('parking_user');
      alert('账号已注销，个人信息已完成合规擦除');
      goRegister();
    } else {
      alert(data.message || '注销失败');
      resetCancelBtn();
    }
  } catch (err) {
    if (err.name === 'AbortError') alert('请求超时，请重试');
    else alert('网络错误，请检查连接');
    resetCancelBtn();
  }
  hideLoading();
}

// ═══════════════ CAPTCHA (yeild/jigsaw) ═══════════════
let capDragging = false;
let capFailCount = 0; // 业务逻辑：失败3次封1分钟

function loadCaptcha() {
  const el = document.getElementById('captcha-container');
  if (!el) return;
  el.innerHTML = '';
  document.getElementById('cap-status').textContent = '拖动滑块，使拼图对齐';
  document.getElementById('cap-status').style.color = '#7B8AA8';
  try {
    jigsaw.init({
      el: el,
      width: 280,
      height: 155,
      onSuccess: function () {
        // 成功：jigsaw 已通过验证 → 生成 captchaId 用于注册
        document.getElementById('cap-status').textContent = '验证通过，正在注册...';
        document.getElementById('cap-status').style.color = '#0E7C45';
        capFailCount = 0;
        var jigsawId = 'jigsaw-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
        doRegister(jigsawId);
      },
      onFail: function () {
        // 失败：用户拉下对不上缺口 → 累计失败次数
        capFailCount++;
        if (capFailCount >= 3) {
          // 业务逻辑：失败3次封禁1分钟 → 直接跳转到封禁页
          document.getElementById('cap-status').textContent = '连续失败 3 次，IP 已被临时封禁 1 分钟';
          document.getElementById('cap-status').style.color = '#E0294B';
          document.getElementById('blocked-reason').textContent = '连续 3 次拼图验证失败';
          document.getElementById('blocked-hint').textContent = 'IP 已被临时封禁';
          startBlockCountdown();
          showPage('blocked');
          capFailCount = 0;
        } else {
          document.getElementById('cap-status').textContent = '验证失败 (' + capFailCount + '/3)，请重试';
          document.getElementById('cap-status').style.color = '#E0294B';
        }
      },
      onRefresh: function () {
        document.getElementById('cap-status').textContent = '拖动滑块，使拼图对齐';
        document.getElementById('cap-status').style.color = '#7B8AA8';
      }
    });
  } catch (e) {
    document.getElementById('cap-status').textContent = '验证码初始化失败';
    console.error('[jigsaw]', e);
  }
}

function resetCaptcha() {
  const el = document.getElementById('captcha-container');
  if (el) el.innerHTML = '';
  document.getElementById('cap-status').textContent = '';
  capDragging = false;
  capFailCount = 0;
}

// ── Init: restore session ──
function doInit() {
  try {
    var u = localStorage.getItem('parking_user');
    if (u) {
      var parsed = JSON.parse(u);
      _phone = parsed.phone;
      renderHome(parsed);
      showPage('home');
    }
  } catch (e) {
    // 手机上初始化失败时不要崩溃，保持注册页可见
    // fallback: 确保至少注册页可见
    document.querySelector('.page.active') || showPage('register');
    console.error('[init]', e);
  }
}
// 等待 DOM 就绪后再初始化（修复手机白屏）
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', doInit);
} else {
  doInit();
}
</script>
