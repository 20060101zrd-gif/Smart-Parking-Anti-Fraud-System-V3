# ============================================================
# Redis 7.x 持久化配置文件 (RDB 模式)
# 用于 parking-fraud-system 风控系统
# ============================================================

# ── 网络 ────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no
tcp-keepalive 300
# requirepass 请通过环境变量或 docker-compose 传入，不要硬编码密码
# requirepass ${REDIS_PASSWORD}

# ── RDB 持久化 ──────────────────────────────────────────────
# 保存策略：900秒内1次变更 / 300秒内10次变更 / 60秒内10000次变更
save 900 1
save 300 10
save 60 10000

# RDB 文件名与存储目录（挂载到宿主机持久卷）
dbfilename dump.rdb
dir /data

# 写入失败时拒绝写入（防止静默丢数据）
stop-writes-on-bgsave-error yes
# 压缩 RDB 文件（节省磁盘空间）
rdbcompression yes
# 写入后校验 CRC64
rdbchecksum yes

# ── 内存 ────────────────────────────────────────────────────
maxmemory 128mb
# 内存满时淘汰策略：allkeys-lru（最近最少使用）
maxmemory-policy allkeys-lru

# ── 日志 ────────────────────────────────────────────────────
loglevel notice
logfile ""
syslog-enabled no

# ── 慢查询日志 ──────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── 客户端 ──────────────────────────────────────────────────
timeout 300
maxclients 10000
