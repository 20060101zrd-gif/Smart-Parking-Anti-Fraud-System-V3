<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>免费停车券 - Redesigned Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: linear-gradient(180deg, #F0F9FF 0%, #E0F2FE 40%, #F8FAFC 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .phone-frame {
      width: 390px;
      height: 844px;
      background: linear-gradient(180deg, #F0F9FF 0%, #E0F2FE 30%, #F8FAFC 100%);
      border-radius: 48px;
      box-shadow: 0 25px 80px rgba(30, 64, 175, 0.15), 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 34px;
      background: #1a1a1a;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      z-index: 10;
    }
    .content {
      flex: 1;
      padding: 80px 28px 40px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    /* Logo Area */
    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 96px;
      height: 96px;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(37, 99, 235, 0.3), 0 4px 8px rgba(37, 99, 235, 0.15);
      margin-bottom: 20px;
    }
    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .brand-name {
      font-size: 26px;
      font-weight: 700;
      color: #0F172A;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .brand-tagline {
      font-size: 14px;
      color: #64748B;
      font-weight: 400;
    }
    /* Card */
    .card {
      background: #FFFFFF;
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 4px;
      text-align: center;
    }
    .card-subtitle {
      font-size: 13px;
      color: #94A3B8;
      text-align: center;
      margin-bottom: 24px;
    }
    /* Input Fields */
    .input-group {
      margin-bottom: 16px;
    }
    .input-label {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 6px;
      display: block;
      padding-left: 4px;
    }
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: #F8FAFC;
      border: 1.5px solid #E2E8F0;
      border-radius: 14px;
      padding: 0 16px;
      height: 52px;
      transition: all 0.2s ease;
    }
    .input-wrapper:focus-within {
      border-color: #3B82F6;
      background: #FFFFFF;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    .input-icon {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .input-icon svg {
      width: 100%;
      height: 100%;
    }
    .input-field {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 16px;
      color: #0F172A;
      font-family: inherit;
    }
    .input-field::placeholder {
      color: #CBD5E1;
    }
    /* Button */
    .submit-btn {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
      color: white;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35), 0 2px 6px rgba(37, 99, 235, 0.2);
      transition: all 0.2s ease;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px rgba(37, 99, 235, 0.4), 0 4px 8px rgba(37, 99, 235, 0.25);
    }
    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }
    .btn-arrow {
      width: 18px;
      height: 18px;
    }
    /* Trust Section */
    .trust-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: auto;
      padding-top: 20px;
    }
    .trust-icon {
      width: 14px;
      height: 14px;
      color: #10B981;
    }
    .trust-text {
      font-size: 12px;
      color: #94A3B8;
    }
    /* Decorative elements */
    .deco-circle-1 {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
      top: -80px;
      right: -80px;
      pointer-events: none;
    }
    .deco-circle-2 {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(16,185,129,0.06) 0%, transparent 70%);
      bottom: 100px;
      left: -60px;
      pointer-events: none;
    }
    /* Scrollbar hide */
    .content::-webkit-scrollbar { display: none; }
    .content { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="notch"></div>
    <div class="deco-circle-1"></div>
    <div class="deco-circle-2"></div>
    <div class="content">
      <!-- Logo Section -->
      <div class="logo-section">
        <div class="logo-icon"><img src="icon.jpg" alt="logo"></div>
        <div class="brand-name">停小券</div>
        <div class="brand-tagline">免费停车券 · 一键领取</div>
      </div>

      <!-- Form Card -->
      <div class="card">
        <div class="card-title">注册领券</div>
        <div class="card-subtitle">首次注册即可领取免费停车券</div>

        <div class="input-group">
          <label class="input-label">手机号码</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                <line x1="12" y1="18" x2="12.01" y2="18"/>
              </svg>
            </div>
            <input class="input-field" type="tel" placeholder="请输入手机号" maxlength="11">
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">真实姓名</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <input class="input-field" type="text" placeholder="请输入姓名">
          </div>
        </div>

        <button class="submit-btn">
          <span>注册领券</span>
          <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>

      <!-- Trust -->
      <div class="trust-section">
        <svg class="trust-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span class="trust-text">数据加密传输 · 隐私安全保护</span>
      </div>
    </div>
  </div>
</body>
</html>
